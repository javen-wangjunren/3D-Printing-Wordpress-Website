<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0047AB',
                        heading: '#1D2938',
                        border: '#E4E7EC',
                        bglight: '#F8F9FB'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* 物理锁定感强调 */
        .tab-active {
            border-bottom-width: 3px !important;
            border-bottom-color: #0047AB !important;
        }
    </style>
</head>
<body class="bg-white font-sans antialiased text-[#1D2938]">

<section class="py-[120px] bg-white" x-data="{ 
    activeTab: 'Metals',
    materials: {
        'Metals': [
            { name: '15-5PH Stainless Steel', img: 'https://via.placeholder.com/800x600/F8F9FB/0047AB?text=15-5PH+Steel', slug: '#' },
            { name: '316L Stainless Steel', img: 'https://via.placeholder.com/800x600/F8F9FB/0047AB?text=316L+Steel', slug: '#' },
            { name: 'AlSi10Mg Aluminum', img: 'https://via.placeholder.com/800x600/F8F9FB/0047AB?text=AlSi10Mg', slug: '#' },
            { name: 'TC4 Titanium', img: 'https://via.placeholder.com/800x600/F8F9FB/0047AB?text=Titanium+TC4', slug: '#' }
        ],
        'Plastics': [
            { name: 'PEEK (High-Temp)', img: 'https://via.placeholder.com/800x600/F8F9FB/0047AB?text=PEEK', slug: '#' },
            { name: 'PA12-CF (Carbon Fiber)', img: 'https://via.placeholder.com/800x600/F8F9FB/0047AB?text=PA12-CF', slug: '#' },
            { name: 'PA12 Nylon', img: 'https://via.placeholder.com/800x600/F8F9FB/0047AB?text=PA12', slug: '#' }
        ],
        'Resins': [
            { name: 'ABS-like Resin', img: 'https://via.placeholder.com/800x600/F8F9FB/0047AB?text=ABS-like', slug: '#' },
            { name: 'Nylon-like Resin', img: 'https://via.placeholder.com/800x600/F8F9FB/0047AB?text=Nylon-like', slug: '#' }
        ],
        'Elastomers': [
            { name: 'TPU 95A', img: 'https://via.placeholder.com/800x600/F8F9FB/0047AB?text=TPU+95A', slug: '#' }
        ]
    }
}">
    <div class="max-w-[1440px] mx-auto px-6 lg:px-[80px]">
        
        <!-- Section Header -->
        <div class="text-center mb-16">
            <h2 class="text-[36px] md:text-[48px] font-bold text-heading tracking-[-1px] mb-4">
                Explore Our <span class="text-primary">Material Library</span>
            </h2>
            <p class="text-[#667085] text-[16px] font-medium max-w-[700px] mx-auto leading-relaxed">
                Industrial-grade materials curated for performance, precision, and rapid production cycles.
            </p>
        </div>

        <!-- Category Tabs -->
        <div class="flex justify-center mb-16 border-b border-border">
            <div class="flex gap-10 overflow-x-auto no-scrollbar scroll-smooth">
                <template x-for="cat in Object.keys(materials)">
                    <button @click="activeTab = cat"
                            :class="activeTab === cat ? 'tab-active text-primary' : 'text-[#667085] border-transparent hover:text-heading'"
                            class="pb-5 border-b-2 font-bold text-[15px] transition-all whitespace-nowrap flex items-center gap-2.5">
                        <span x-text="cat"></span>
                        <span class="font-mono text-[12px] opacity-50" x-text="'(' + materials[cat].length + ')' "></span>
                    </button>
                </template>
            </div>
        </div>

        <!-- Materials Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 mb-20">
            <template x-for="item in materials[activeTab]" :key="item.name">
                <a :href="item.slug" class="group block bg-white rounded-xl overflow-hidden border border-[#E4E7EC] hover:border-primary transition-all duration-500 hover:shadow-[0_20px_50px_rgba(0,71,171,0.08)]">
                    <!-- Image Wrapper (Lock 4:3) -->
                    <div class="aspect-[4/3] overflow-hidden bg-bglight relative">
                        <img :src="item.img" :alt="item.name" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                    </div>
                    <!-- Card Body -->
                    <div class="p-7 text-center border-t border-[#E4E7EC]">
                        <h3 class="text-[17px] font-bold text-heading group-hover:text-primary transition-colors leading-tight" x-text="item.name"></h3>
                    </div>
                </a>
            </template>
        </div>

        <!-- Footer Action -->
        <div class="flex justify-center">
            <a href="/all-materials" class="group inline-flex items-center gap-5 px-12 py-5 bg-primary text-white font-bold rounded-xl border-2 border-primary hover:bg-white hover:text-primary transition-all duration-300 shadow-lg shadow-primary/10">
                <span class="text-[15px]">Explore Full Material Catalog</span>
                <span class="font-mono text-[13px] bg-white/20 px-2.5 py-0.5 rounded group-hover:bg-primary/10 transition-colors">40+</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-transform group-hover:translate-x-1.5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            </a>
        </div>
    </div>
</section>

</body>
</html>

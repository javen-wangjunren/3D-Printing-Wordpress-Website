<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DPROTO - Visual Transformation Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#0047AB',
                            hover: '#003A8C',
                            active: '#002E6E',
                        },
                        industrial: '#1D2938',
                        border: '#E4E7EC',
                        panel: '#F8F9FB'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .slider-thumb::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 4px;
            height: 100vh;
            background: #0047AB;
        }
        /* 确保图片不被压缩 */
        .comparison-img {
            max-width: none !important;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }
    </style>
</head>
<body class="bg-white font-sans antialiased text-industrial">

<section class="py-24 bg-white" x-data="{ 
    position: 50,
    containerWidth: 0,
    updateWidth() { this.containerWidth = this.$refs.container.offsetWidth }
}" x-init="updateWidth()" @resize.window="updateWidth()">
    
    <div class="w-[95%] lg:w-[1200px] mx-auto">
        <!-- L型信息流：左右分割布局 -->
        <div class="flex flex-col lg:flex-row items-center gap-12 lg:gap-20">
            
            <!-- 左侧内容簇：垂直居中校准 -->
            <div class="w-full lg:w-[420px] shrink-0">
                <div class="space-y-8">
                    <div>
                        <h2 class="text-[32px] lg:text-[42px] font-extrabold tracking-[-0.5px] leading-tight text-industrial">
                            Surface <br> <span class="text-primary">Transformation</span>
                        </h2>
                    </div>

                    <div class="space-y-6 border-l-2 border-border pl-6 py-2">
                        <div class="flex flex-col gap-2">
                            <span class="font-mono text-primary font-bold text-[13px]">PHASE 01 // RAW PRINT</span>
                            <p class="text-[14px] text-industrial/60 leading-relaxed">
                                Characteristic stair-stepping effects with a roughness index of Ra 6.3μm.
                            </p>
                        </div>
                        <div class="flex flex-col gap-2">
                            <span class="font-mono text-primary font-bold text-[13px]">PHASE 02 // POST-PROCESS</span>
                            <p class="text-[14px] text-industrial/60 leading-relaxed">
                                Vapor smoothing results in a semi-gloss, sealed surface with Ra 0.8μm finish.
                            </p>
                        </div>
                    </div>

                    <div class="pt-4">
                        <button class="bg-primary text-white font-mono text-[13px] px-8 py-4 rounded-[8px] hover:bg-primary-hover active:bg-primary-active transition-all flex items-center gap-3 group">
                            VIEW FINISHING SPECS
                            <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 右侧固定比例视觉样张 -->
            <div class="w-full flex-1">
                <div x-ref="container" 
                     class="relative aspect-[4/3] w-full rounded-[12px] overflow-hidden bg-panel border border-border select-none group shadow-sm">
                    
                    <!-- After Image (Base) -->
                    <div class="absolute inset-0 w-full h-full">
                        <img src="https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=2000" 
                             class="w-full h-full object-cover" alt="Post-processed Surface">
                    </div>

                    <!-- Before Image (Overlay) -->
                    <div class="absolute inset-0 h-full overflow-hidden border-r-[3px] border-primary z-10" 
                         :style="'width: ' + position + '%'">
                        <div :style="'width: ' + containerWidth + 'px'" class="h-full relative">
                            <img src="https://images.unsplash.com/photo-1581092160562-40aa08e78837?auto=format&fit=crop&q=80&w=2000" 
                                 class="w-full h-full object-cover grayscale-[40%]" alt="Raw Surface">
                        </div>
                    </div>

                    <!-- 物理锁定感滑块 -->
                    <div class="absolute top-0 bottom-0 z-20 pointer-events-none" :style="'left: ' + position + '%'">
                        <div class="absolute top-1/2 left-0 -translate-x-1/2 -translate-y-1/2 w-10 h-10 bg-primary rounded-full shadow-lg flex items-center justify-center border-[3px] border-white">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M8 7l-4 4m0 0l4 4m-4-4h16m0 0l-4-4m4 4l-4 4"></path>
                            </svg>
                        </div>
                    </div>

                    <input type="range" min="0" max="100" x-model="position" 
                           class="absolute inset-0 w-full h-full opacity-0 cursor-col-resize z-30">
                </div>
            </div>
        </div>
    </div>
</section>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DPROTO - Value Panel v5.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0047AB',
                        industrial: '#1D2938',
                        border: '#E4E7EC',
                        panel: '#F8F9FB'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .grid-pattern {
            background-image: radial-gradient(circle, #E4E7EC 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-white font-sans antialiased text-industrial">

<section class="py-16 lg:py-[120px] bg-white relative overflow-hidden">
    <!-- Background Technical Decor -->
    <div class="absolute top-0 right-0 w-1/3 h-full bg-[#F8F9FB]/50 -skew-x-12 translate-x-1/2 -z-10"></div>
    
    <div class="max-w-[1400px] mx-auto px-6 lg:px-[80px] relative">
        
        <!-- Global Section Header -->
        <div class="mb-10 lg:mb-14">
            <h2 class="text-[36px] lg:text-[44px] font-extrabold text-industrial tracking-[-1px] leading-tight">
                Why Choose <span class="text-primary">3DPROTO</span>
            </h2>
        </div>

        <div class="bg-white border border-border rounded-[24px] lg:rounded-[40px] overflow-hidden flex flex-col lg:flex-row shadow-sm min-h-[700px] lg:min-h-[850px]" 
             x-data="{ 
                activeTab: 'EFFICIENCY',
                content: {
                    'EFFICIENCY': {
                        title: 'Operational Efficiency',
                        desc: 'From CAD upload to global delivery, we minimize lead times through automation.',
                        img: 'https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=1200',
                        engPoints: ['Instant DFM analysis on every CAD upload', '24-hour rapid manufacturing for urgent iterations'],
                        buyPoints: ['Real-time quote engine reduces procurement cycles', '97.4% on-time delivery rate across global logistics']
                    },
                    'QUALITY': {
                        title: 'Precision Quality',
                        desc: 'Rigorous inspection protocols for mission-critical industrial applications.',
                        img: 'https://images.unsplash.com/photo-1537462715879-360eeb61a0ad?auto=format&fit=crop&q=80&w=1200',
                        engPoints: ['Strict adherence to ISO 2768-C tolerance standards', 'Advanced CMM inspection for critical dimensions'],
                        buyPoints: ['ISO 9001:2015 certified quality management systems', 'Full material traceability and certification reports']
                    },
                    'CAPACITY': {
                        title: 'Scalable Capacity',
                        desc: 'Industrial fleet capable of handling prototypes to high-volume production.',
                        img: 'https://images.unsplash.com/photo-1565043666747-69f6646db940?auto=format&fit=crop&q=80&w=1200',
                        engPoints: ['Industrial fleet for complex internal geometries', 'Large-scale build volumes up to 800mm without segmenting'],
                        buyPoints: ['Flexible production from 1 to 10,000+ units', 'Tiered pricing models optimized for industrial scale']
                    },
                    'EXPERTISE': {
                        title: 'Material Expertise',
                        desc: 'Deep metallurgical and polymer insight for high-performance parts.',
                        img: 'https://images.unsplash.com/photo-1581092160562-40aa08e78837?auto=format&fit=crop&q=80&w=1200',
                        engPoints: ['Specialized PEEK & Carbon Fiber print optimization', 'Advanced metallurgy for 15-5PH & Titanium alloys'],
                        buyPoints: ['Deep industry experience in aerospace & medical sectors', 'Dedicated technical account management support']
                    }
                }
             }">
            
            <!-- Left Rail: Console Controls (30%) -->
            <div class="lg:w-[380px] bg-panel p-8 lg:p-14 flex flex-col border-b lg:border-b-0 lg:border-r border-border relative">
                <!-- Grid Overlay -->
                <div class="absolute inset-0 grid-pattern opacity-[0.4] pointer-events-none"></div>
                
                <div class="relative z-10 mb-12">
                    <h4 class="font-mono text-[14px] font-extrabold text-primary uppercase tracking-[-0.5px] mb-4 flex items-center gap-2">
                        Console / Navigation
                    </h4>
                    <div class="h-[1px] w-12 bg-primary/30"></div>
                </div>
                
                <nav class="relative z-10 flex-1 space-y-6 lg:space-y-10">
                    <template x-for="tab in Object.keys(content)">
                        <button @click="activeTab = tab"
                                :class="activeTab === tab ? 'border-primary bg-white/50 shadow-sm' : 'border-transparent opacity-60 hover:opacity-100'"
                                class="w-full text-left transition-all duration-300 group border-l-[3px] pl-6 py-3 outline-none rounded-r-xl">
                            <div class="flex flex-col gap-1.5">
                                <div class="flex items-center gap-3">
                                    <span :class="activeTab === tab ? 'text-primary' : 'text-body opacity-40'" class="font-mono text-[11px] font-bold relative" x-text="'0' + (Object.keys(content).indexOf(tab) + 1)">
                                        <!-- Scanning Line for active tab -->
                                        <span x-show="activeTab === tab" class="absolute -left-1 top-0 w-[1px] h-full bg-primary/40 animate-ping"></span>
                                    </span>
                                    <h3 :class="activeTab === tab ? 'text-industrial' : 'text-body'" class="font-bold uppercase tracking-[1.5px] text-[14px] lg:text-[15px]" x-text="tab"></h3>
                                </div>
                                <p x-show="activeTab === tab" 
                                   x-transition:enter="transition ease-out duration-300"
                                   x-transition:enter-start="opacity-0 -translate-y-2"
                                   class="text-[12px] lg:text-[13px] text-body leading-snug font-medium pr-4" 
                                   x-text="content[tab].desc"></p>
                            </div>
                        </button>
                    </template>
                </nav>
            </div>

            <!-- Right Content: Information Matrix (70%) -->
            <div class="flex-1 flex flex-col bg-white">
                <!-- Fixed Height Visual Asset -->
                <div class="h-[300px] lg:h-[400px] overflow-hidden bg-industrial relative">
                    <img :src="content[activeTab].img" class="w-full h-full object-cover grayscale-[10%] hover:grayscale-0 transition-all duration-1000">
                </div>

                <!-- Data Matrix -->
                <div class="p-8 lg:p-16 flex-1 flex flex-col justify-center">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-10 lg:gap-16">
                        
                        <!-- Persona 01: Engineers -->
                        <div x-show="activeTab" x-transition:enter="transition ease-out duration-500 delay-100" x-transition:enter-start="opacity-0 translate-y-4">
                            <div class="flex items-center gap-4 mb-8">
                                <span class="font-mono text-[14px] font-extrabold text-primary tracking-[-0.5px]">01 / Engineering</span>
                                <div class="relative h-[1px] flex-1 bg-border/60">
                                    <div class="absolute right-0 top-1/2 -translate-y-1/2 w-[1px] h-3 bg-border"></div>
                                </div>
                            </div>
                            <ul class="space-y-4 lg:space-y-6">
                                <template x-for="point in content[activeTab].engPoints">
                                    <li class="flex items-start gap-4 group">
                                        <div class="w-1.5 h-1.5 rounded-full bg-primary mt-2"></div>
                                        <p class="text-[15px] lg:text-[16px] text-industrial font-bold tracking-[-0.3px] leading-relaxed" x-text="point"></p>
                                    </li>
                                </template>
                            </ul>
                        </div>

                        <!-- Persona 02: Procurement -->
                        <div x-show="activeTab" x-transition:enter="transition ease-out duration-500 delay-200" x-transition:enter-start="opacity-0 translate-y-4">
                            <div class="flex items-center gap-4 mb-8">
                                <span class="font-mono text-[14px] font-extrabold text-primary tracking-[-0.5px]">02 / Procurement</span>
                                <div class="relative h-[1px] flex-1 bg-border/60">
                                    <div class="absolute right-0 top-1/2 -translate-y-1/2 w-[1px] h-3 bg-border"></div>
                                </div>
                            </div>
                            <ul class="space-y-4 lg:space-y-6">
                                <template x-for="point in content[activeTab].buyPoints">
                                    <li class="flex items-start gap-4 group">
                                        <div class="w-1.5 h-1.5 rounded-full bg-primary mt-2"></div>
                                        <p class="text-[15px] lg:text-[16px] text-industrial font-bold tracking-[-0.3px] leading-relaxed" x-text="point"></p>
                                    </li>
                                </template>
                            </ul>
                        </div>

                    </div>

                    <!-- Action Link -->
                    <div class="mt-12 lg:mt-16 pt-10 border-t border-border flex flex-col sm:flex-row justify-end items-center gap-6">
                        <a href="/instant-quote/" class="group bg-primary text-white px-10 py-4 rounded-[8px] text-[13px] font-bold uppercase tracking-[2px] flex items-center gap-2 hover:bg-[#003580] transition-all duration-300 shadow-lg shadow-primary/10 hover:shadow-primary/20">
                            Start Your Project
                            <svg class="w-4 h-4 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>

</body>
</html>

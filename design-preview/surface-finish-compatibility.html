<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DPROTO - Technical Compatibility</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0047AB',
                        industrial: '#1D2938',
                        border: '#E4E7EC',
                        panel: '#F8F9FB'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    },
                    maxWidth: {
                        'container': '1280px'
                    },
                    padding: {
                        'container': '2rem'
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-white font-sans antialiased text-industrial">

<section class="py-24 bg-white" x-data="{
    processes: [
        { name: 'SLS', supported: true, url: '/capabilities/sls/' },
        { name: 'MJF', supported: true, url: '/capabilities/mjf/' }
    ],
    materials: [
        { name: 'Nylon 12 (PA12)', url: '#' },
        { name: 'Nylon 11 (PA11)', url: '#' },
        { name: 'Flexible TPU', url: '#' },
        { name: 'Nylon 12 GF', url: '#' },
        { name: 'Polypropylene (PP)', url: '#' },
        { name: 'Resin Tough 2000', url: '#' },
        { name: 'Resin High Temp', url: '#' },
        { name: 'Stainless Steel 316L', url: '#' },
        { name: 'Aluminum AlSi10Mg', url: '#' }
    ]
}">
    <div class="max-w-container mx-auto px-container">
        
        <!-- Header -->
        <div class="mb-12">
            <h2 class="text-3xl md:text-4xl font-extrabold tracking-tight leading-none text-industrial">
                Technical <span class="text-primary">Compatibility</span>
            </h2>
        </div>

        <!-- Layout Strategy: Stacked Sections -->
        <!-- Changing from Side-by-Side (grid-cols-2) to Stacked (flex-col) to handle content imbalance -->
        <div class="flex flex-col gap-16">
            
            <!-- Section 1: Supported Processes -->
            <!-- Horizontal Grid to save vertical space -->
            <div>
                <div class="flex items-center gap-4 mb-6 border-b border-border pb-4">
                    <div class="w-2 h-2 bg-primary rounded-full"></div>
                    <h4 class="text-sm font-bold uppercase tracking-widest text-industrial/50">Supported Processes</h4>
                </div>
                
                <!-- Grid: Auto-fit for processes (Max 4 per row usually) -->
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                    <template x-for="p in processes">
                        <a :href="p.url" 
                           class="flex items-center justify-between px-6 py-4 border border-border rounded-lg hover:border-primary hover:bg-panel hover:-translate-y-1 transition-all duration-300 group bg-white shadow-sm">
                            <span class="font-extrabold text-lg tracking-tight" x-text="p.name"></span>
                            <svg class="w-5 h-5 text-primary opacity-40 group-hover:opacity-100 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                        </a>
                    </template>
                </div>
            </div>

            <!-- Section 2: Verified Materials -->
            <!-- Grid Layout for dense data -->
            <div>
                <div class="flex items-center gap-4 mb-6 border-b border-border pb-4">
                    <div class="w-2 h-2 bg-primary rounded-full"></div>
                    <h4 class="text-sm font-bold uppercase tracking-widest text-industrial/50">Verified Materials</h4>
                </div>

                <!-- Grid: 3 Columns on Desktop to balance the list -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <template x-for="m in materials">
                        <a :href="m.url" 
                           class="flex items-center gap-4 pl-5 pr-4 py-3 border border-border rounded-lg hover:border-primary hover:bg-panel hover:-translate-y-1 transition-all duration-300 group bg-white shadow-sm">
                            
                            <!-- Icon Box -->
                            <div class="w-10 h-10 rounded-md bg-panel group-hover:bg-primary/10 flex items-center justify-center transition-colors shrink-0">
                                <svg class="w-5 h-5 text-industrial/30 group-hover:text-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                            </div>

                            <!-- Material Name -->
                            <span class="text-[15px] font-bold text-industrial group-hover:text-primary transition-colors" x-text="m.name"></span>
                            
                            <!-- Arrow (Auto margin left to push to end) -->
                            <div class="ml-auto opacity-0 group-hover:opacity-100 transition-opacity">
                                <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </div>
                        </a>
                    </template>
                </div>
            </div>

        </div>
    </div>
</section>

</body>
</html>

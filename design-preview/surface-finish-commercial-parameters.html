<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DPROTO - Configurable Commercial Params</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0047AB',
                        industrial: '#1D2938',
                        border: '#E4E7EC',
                        panel: '#F8F9FB'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white font-sans antialiased text-industrial">

<section class="py-24 bg-white" x-data="{
    /* 这里是配置中心：针对不同页面只需修改此数组 */
    /* 场景：Vapor Polishing (注重质量与价值) */
    params: [
        { 
            icon: 'M13 10V3L4 14h7v7l9-11h-7z', 
            label: 'Value Addition', 
            value: '[ HIGH_IMPACT ]', 
            desc: 'Significantly increases the aesthetic value and air-tightness of parts.',
            type: 'standard'
        },
        { 
            icon: 'M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z', 
            label: 'Yield Assurance', 
            value: '[ 99.2% YIELD ]', 
            desc: 'Controlled chemical process ensures maximum repeatability across large batches.',
            type: 'standard'
        },
        { 
            icon: 'M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z', 
            label: 'Cost Efficiency', 
            value: '$$', 
            desc: 'Premium finish at an optimized cost for mid-to-high volume production.',
            type: 'cost'
        }
    ]
}">
    <div class="w-[90%] lg:w-[80%] mx-auto">
        
        <div class="mb-16">
            <h3 class="text-[36px] font-extrabold tracking-tighter leading-none">
                Procurement <span class="text-primary italic">Strategy Guide</span>
            </h3>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <template x-for="p in params" :key="p.label">
                <div class="p-10 border border-border rounded-[32px] hover:border-primary transition-all duration-300 group flex flex-col bg-white">
                    <div class="mb-8 w-12 h-12 rounded-2xl bg-panel flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" :d="p.icon"></path>
                        </svg>
                    </div>

                    <h4 class="text-[14px] font-extrabold uppercase tracking-widest text-industrial/40 mb-4" x-text="p.label"></h4>

                    <div class="mb-6 h-10 flex items-center">
                        <template x-if="p.type === 'standard'">
                            <span class="font-mono text-[24px] lg:text-[28px] font-extrabold text-primary" x-text="p.value"></span>
                        </template>
                        <template x-if="p.type === 'cost'">
                            <div class="flex items-center gap-1">
                                <span class="font-mono text-[28px] font-extrabold text-primary" x-text="p.value"></span>
                                <span class="font-mono text-[28px] font-extrabold text-industrial/10">$$$</span>
                            </div>
                        </template>
                    </div>

                    <p class="text-[14px] text-industrial/60 leading-relaxed font-medium" x-text="p.desc"></p>
                </div>
            </template>
        </div>
    </div>
</section>

</body>
</html>

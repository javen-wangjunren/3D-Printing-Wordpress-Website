<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DPROTO B2B Industrial CTA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0047AB', // 品牌蓝
                        heading: '#1D2938', // 工业深
                        bglight: '#F8F9FB'  // 全局无缝底色
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white font-sans antialiased">

<section class="py-[96px] bg-white">
    <div class="max-w-[1280px] mx-auto px-6">
        <!-- Main Banner Container (Rounded & Blue Background) -->
        <div class="relative bg-primary rounded-[32px] overflow-hidden py-20 px-8 md:px-20 text-center shadow-2xl">
            
            <!-- Symmetrical Decorative Elements (Yellow Circles) -->
            <div class="absolute -left-20 top-1/2 -translate-y-1/2 w-[300px] h-[300px] bg-[#FFC107] rounded-full opacity-90 hidden lg:block"></div>
            <div class="absolute -right-20 top-1/2 -translate-y-1/2 w-[300px] h-[300px] bg-[#FFC107] rounded-full opacity-90 hidden lg:block"></div>

            <!-- Content Container -->
            <div class="relative z-10 max-w-[800px] mx-auto">
                
                <!-- Badge (Optional, from image) -->
                <div class="inline-block px-4 py-1.5 bg-white/10 border border-white/20 rounded-full text-white/90 text-[13px] font-medium mb-8 backdrop-blur-sm">
                    Ready to scale production?
                </div>

                <h2 class="text-[42px] md:text-[56px] font-[800] text-white leading-[1.1] mb-8 tracking-[-1.5px]">
                    You have the idea — <br>
                    <span class="text-[#FFC107]">we make it a reality.</span>
                </h2>

                <p class="text-white/80 text-[18px] mb-12 max-w-[600px] mx-auto leading-relaxed">
                    Join thousands of industrial partners and experience premium 3D printing services like never before.
                </p>
                
                <div class="flex flex-col sm:flex-row justify-center items-center gap-6">
                    <a href="#" class="group relative w-full sm:w-auto px-10 py-5 bg-[#FFC107] text-heading font-bold rounded-xl shadow-lg transition-all hover:-translate-y-1 hover:shadow-xl overflow-hidden flex items-center justify-center gap-2">
                        <span class="tracking-[1px] text-[16px]">Get Instant Quote</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </a>
                    
                    <a href="#" class="w-full sm:w-auto px-10 py-5 bg-white text-primary font-bold rounded-xl hover:bg-white/90 transition-all tracking-[1px] text-[16px] flex items-center justify-center">
                        Learn More
                    </a>
                </div>
            </div>

            <!-- Symmetrical Product Showcase (Transparent Parts) -->
            <div class="absolute left-[-2%] bottom-[-5%] w-[320px] h-auto hidden xl:block pointer-events-none group/part">
                <img src="https://3d-printing.com/wp-content/uploads/2024/01/industrial-part-01.png" alt="Industrial Part Left" class="w-full h-auto drop-shadow-[0_20px_50px_rgba(0,0,0,0.3)] transition-transform duration-700 group-hover/part:-translate-y-4 group-hover/part:rotate-3">
            </div>
            <div class="absolute right-[-2%] bottom-[-5%] w-[320px] h-auto hidden xl:block pointer-events-none group/part">
                <img src="https://3d-printing.com/wp-content/uploads/2024/01/industrial-part-02.png" alt="Industrial Part Right" class="w-full h-auto drop-shadow-[0_20px_50px_rgba(0,0,0,0.3)] transition-transform duration-700 group-hover/part:-translate-y-4 group-hover/part:-rotate-3">
            </div>
        </div>

        <!-- Trust Badges (Relocated below the main banner) -->
        <div class="mt-16 flex flex-wrap justify-center items-center gap-x-12 gap-y-6 opacity-60">
            <div class="flex flex-col items-center gap-1">
                <span class="font-mono text-[13px] font-bold text-[#1D2938]">ISO 9001:2015</span>
                <span class="text-[10px] text-[#667085] uppercase tracking-widest">Quality Mgmt</span>
            </div>
            <div class="flex flex-col items-center gap-1">
                <span class="font-mono text-[13px] font-bold text-[#1D2938]">AS9100D</span>
                <span class="text-[10px] text-[#667085] uppercase tracking-widest">Aerospace</span>
            </div>
            <div class="flex flex-col items-center gap-1">
                <span class="font-mono text-[13px] font-bold text-[#1D2938]">IATF 16949</span>
                <span class="text-[10px] text-[#667085] uppercase tracking-widest">Automotive</span>
            </div>
            <div class="flex flex-col items-center gap-1">
                <span class="font-mono text-[13px] font-bold text-[#1D2938]">GD&T</span>
                <span class="text-[10px] text-[#667085] uppercase tracking-widest">Precision</span>
            </div>
        </div>
    </div>
</section>

</body>
</html>

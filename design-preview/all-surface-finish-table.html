<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DPROTO - Surface Finish Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0047AB',
                        industrial: '#1D2938',
                        border: '#E4E7EC',
                        panel: '#F8F9FB'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white font-sans antialiased text-industrial">

<section class="py-24 bg-white" x-data="{ 
    activeTab: 'ALL',
    finishes: [
        { 
            name: 'As Machined', 
            desc: 'Standard finish with visible layer lines and a matte texture.', 
            ra: '3.2 - 6.3 μm', 
            processes: ['PLASTIC', 'METAL'], 
            techs: ['SLS', 'MJF', 'FDM'],
            leadTime: '0 DAYS',
            priceHtml: '$<span class=\'text-industrial/10\'>$$</span>',
            img: 'https://images.unsplash.com/photo-1581092160562-40aa08e78837?auto=format&fit=crop&q=80&w=200'
        },
        { 
            name: 'Bead Blasting', 
            desc: 'Uniform matte surface achieved by spraying fine glass beads.', 
            ra: '1.6 - 3.2 μm', 
            processes: ['PLASTIC', 'METAL', 'RESIN'], 
            techs: ['SLS', 'MJF', 'SLM'],
            leadTime: '+ 1 DAY',
            priceHtml: '$$<span class=\'text-industrial/10\'>$</span>',
            img: 'https://images.unsplash.com/photo-1537462715879-360eeb61a0ad?auto=format&fit=crop&q=80&w=200'
        },
        { 
            name: 'Vapor Polishing', 
            desc: 'Chemical process that melts the surface to create a high-gloss finish.', 
            ra: '< 0.8 μm', 
            processes: ['PLASTIC'], 
            techs: ['SLA', 'MJF', 'PolyJet'],
            leadTime: '+ 2 DAYS',
            priceHtml: '$$$',
            img: 'https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=200'
        },
        { 
            name: 'Electropolishing', 
            desc: 'Electrochemical removal of surface material for peak smoothness.', 
            ra: '0.4 - 0.8 μm', 
            processes: ['METAL'], 
            techs: ['SLM', 'DMLS', 'CNC'],
            leadTime: '+ 2 DAYS',
            priceHtml: '$$$',
            img: 'https://images.unsplash.com/photo-1565043666747-69f6646db940?auto=format&fit=crop&q=80&w=200'
        }
    ],
    get filteredFinishes() {
        if (this.activeTab === 'ALL') return this.finishes;
        return this.finishes.filter(f => f.processes.includes(this.activeTab));
    }
}">
    <div class="w-[90%] lg:w-[80%] mx-auto">
        
        <div class="flex flex-col lg:flex-row lg:items-end justify-between gap-8 mb-16">
            <div class="max-w-xl">
                <h2 class="text-[42px] font-[800] tracking-tighter leading-none mb-6">
                    Surface <span class="text-primary">Finishing</span>
                </h2>
                <p class="text-body/60 text-[15px] font-medium leading-relaxed">
                    Explore our range of post-processing options to achieve the perfect functional and aesthetic requirements for your parts.
                </p>
            </div>

            <div class="flex bg-panel p-1.5 rounded-xl border border-border">
                <template x-for="tab in ['ALL', 'PLASTIC', 'RESIN', 'METAL']">
                    <button @click="activeTab = tab"
                            :class="activeTab === tab ? 'bg-white shadow-sm text-primary' : 'text-industrial/40 hover:text-industrial/70'"
                            class="px-6 py-2.5 rounded-lg text-[12px] font-bold uppercase tracking-widest transition-all"
                            x-text="tab">
                    </button>
                </template>
            </div>
        </div>

        <div class="overflow-x-auto no-scrollbar">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="border-b border-industrial/10 text-left">
                        <th class="pb-6 font-mono text-[13px] text-primary uppercase tracking-[1px] whitespace-nowrap">Name</th>
                        <th class="pb-6 font-mono text-[13px] text-primary uppercase tracking-[1px] whitespace-nowrap">Description</th>
                        <th class="pb-6 font-mono text-[13px] text-primary uppercase tracking-[1px] whitespace-nowrap">Material</th>
                        <th class="pb-6 font-mono text-[13px] text-primary uppercase tracking-[1px] whitespace-nowrap">Capability</th>
                        <th class="pb-6 font-mono text-[13px] text-primary uppercase tracking-[1px] whitespace-nowrap">Commercial</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-border">
                    <template x-for="finish in filteredFinishes" :key="finish.name">
                        <tr class="align-middle group hover:bg-panel/50 transition-colors duration-200 cursor-pointer"
                            x-transition:enter="transition ease-out duration-300"
                            x-transition:enter-start="opacity-0 translate-y-2"
                            x-transition:enter-end="opacity-100 translate-y-0">
                            <td class="py-8 pr-8">
                                <div class="flex items-center gap-6">
                                    <div class="w-20 h-20 rounded-xl overflow-hidden bg-panel border border-border flex-shrink-0 relative">
                                        <img :src="finish.img" class="w-full h-full object-cover transform transition-transform duration-700 ease-out group-hover:scale-110">
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <span class="font-extrabold text-[17px] uppercase tracking-tight text-industrial transition-colors duration-300 group-hover:text-primary" x-text="finish.name"></span>
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-primary opacity-0 -translate-x-4 transition-all duration-300 group-hover:opacity-100 group-hover:translate-x-0">
                                            <path d="M5 12h14"></path>
                                            <path d="m12 5 7 7-7 7"></path>
                                        </svg>
                                    </div>
                                </div>
                            </td>
                            <td class="py-8 pr-8 max-w-xs">
                                <p class="text-[14px] text-industrial/60 leading-relaxed font-medium" x-text="finish.desc"></p>
                            </td>
                            <td class="py-8 pr-6">
                                <div class="flex flex-wrap gap-2">
                                    <template x-for="process in finish.processes">
                                        <span class="px-2 py-0.5 bg-panel text-industrial/60 border border-border rounded font-mono text-[10px] font-bold uppercase transition-colors hover:border-industrial/40 hover:text-industrial cursor-default" x-text="process"></span>
                                    </template>
                                </div>
                            </td>
                            <td class="py-8 pr-6">
                                <div class="flex flex-wrap gap-2">
                                    <template x-for="tech in finish.techs">
                                        <span class="px-2 py-0.5 bg-primary/5 text-primary border border-primary/20 rounded font-mono text-[10px] font-bold transition-colors hover:bg-primary/10 cursor-default" x-text="tech"></span>
                                    </template>
                                </div>
                            </td>
                            <td class="py-8">
                                <div class="flex flex-col gap-1">
                                    <span class="font-mono text-[13px] text-primary font-bold" x-text="'[ ' + finish.leadTime + ' ]'"></span>
                                    <span class="font-mono text-[13px] text-industrial/30 font-bold" x-html="finish.priceHtml"></span>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>



    </div>
</section>

</body>
</html>
